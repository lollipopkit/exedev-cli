version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      rust-runtime:
        patterns:
          - tokio
          - reqwest
          - rustls*
          - hyper*
      rust-cli:
        patterns:
          - clap
          - dialoguer
          - comfy-table
      rust-serde:
        patterns:
          - serde
          - serde_json
          - serde_yaml

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
