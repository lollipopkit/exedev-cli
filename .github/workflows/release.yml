name: Release

'on':
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Git tag to release, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - platform: macos-amd64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - platform: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build optimized release binaries
        run: cargo build --profile dist --locked --target ${{ matrix.target }} -p exedev-ctl -p exedev-k8s

      - name: Package release archive
        id: package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag_name }}"
          fi

          archive="exedev-clis-${tag}-${{ matrix.platform }}.tar.gz"
          mkdir -p package dist
          cp "target/${{ matrix.target }}/dist/exedev-ctl" package/
          cp "target/${{ matrix.target }}/dist/exedev-k8s" package/
          cp README.md README.zh-CN.md LICENSE .env.example fleet.example.yaml package/
          tar -czf "dist/${archive}" -C package .
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: dist/${{ steps.package.outputs.archive }}
          if-no-files-found: error

  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag_name }}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          files: dist/*.tar.gz
          generate_release_notes: true
