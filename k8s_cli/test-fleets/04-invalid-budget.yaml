# Negative validation test. This fleet must fail during plan/load.
#
# Expected error:
#   fleet requests 2 worker VMs but workerVmBudget is 1

cluster:
  name: exedev-test-invalid-budget
  controlPlane:
    nodes: 1
    vmPrefix: test-bad-ctl
  workerVmBudget: 1

defaults:
  network: tailscale
  kubernetes: k3s
  image: exeuntu
  isolated: true

projects:
  project1:
    tasks:
      a:
        nodes: 2
        replicas: 1
        vmPrefix: test-bad-a
